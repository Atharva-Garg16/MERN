<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
    #first {
        width: 200px;
        height: 100px;
        background-color: red;
        visibility: hidden;
    }
    #second {
        width: 200px;
        height: 100px;
        background-color: blue;
        visibility: visible ;
    }
    </style>
</head>
<body>
    <div id="first">Box 1</div>
    <div id="second">Box 2</div>
</body>
</html>
