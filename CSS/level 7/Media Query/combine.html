<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        .box1 {
            padding: 4px;
            width: 100px;
            height: 100px;
            background-color: red;
        }

        @media screen and (max-width: 800px) and (min-width: 600px) {

            /* When the screen width is between 600px and 800px, the background color of .box1 will change to blue and it will have a black border. */
            .box1 {
                background-color: blue;
                border: 4px solid black;
                border-radius: 50%;
                text-align: center;
                padding: 20px;
            }
        }
    </style>

    <title>Document</title>
</head>

<body>
    <div class="box1">Box1 </div>


</body>

</html>
